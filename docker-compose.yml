services:
  # ─── Backend API ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ctms_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@host.docker.internal:5433/corporate_tasks
      REDIS_URL: redis://host.docker.internal:6379/0
      CELERY_BROKER_URL: redis://host.docker.internal:6379/1
      CELERY_RESULT_BACKEND: redis://host.docker.internal:6379/2
      SECRET_KEY: ${SECRET_KEY:-super-secret-key-change-in-production-min-32}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      MAIL_SERVER: ${MAIL_SERVER:-smtp.example.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-noreply@example.com}
      GOOGLE_CLIENT_ID: 503978809420-6eqdutk2e95bb27mhb4n54gjkhsng45p.apps.googleusercontent.com
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 3000 --reload
    restart: unless-stopped

  
  # ─── Frontend (Web) ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ctms_frontend
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_WS_URL: ws://localhost:3000/api/v1/notifications/ws
      VITE_GOOGLE_CLIENT_ID: 503978809420-6eqdutk2e95bb27mhb4n54gjkhsng45p.apps.googleusercontent.com
      WATCHPACK_POLLING: true
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app:delegated
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5173', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ─── Nginx (Reverse Proxy) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ctms_nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
